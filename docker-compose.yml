version: '3.8'

services:
  ml-service:
    build: ./ml-service
    ports:
      - "8001:8001"
    networks:
      - movie-network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ML_SERVICE_URL=http://ml-service:8001
    depends_on:
      - ml-service
    networks:
      - movie-network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000 # Note: In production this would be the external URL
    depends_on:
      - backend
    networks:
      - movie-network

  streamlit-app:
    build: ./streamlit-app
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - movie-network

networks:
  movie-network:
    driver: bridge
